<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Website</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f4f4f4;}
header{background:#222;color:white;display:flex;justify-content:space-between;padding:15px 40px;}
nav a{color:white;text-decoration:none;margin:0 15px;}
.hero{background:linear-gradient(to right,#ff7b00,#ff3d00);color:white;text-align:center;padding:80px 20px;}
.hero h1{font-size:45px;}
.hero button{margin-top:20px;padding:12px 25px;border:none;background:white;color:#ff3d00;font-size:18px;cursor:pointer;border-radius:5px;}
.products{display:flex;justify-content:center;flex-wrap:wrap;padding:40px;gap:25px;}
.card{background:white;width:250px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.2);text-align:center;padding:20px;}
.card img{width:100%;border-radius:10px;}
.card h3{margin:15px 0;}
.card button{background:#28a745;color:white;border:none;padding:10px 18px;border-radius:5px;cursor:pointer;}
footer{background:#222;color:white;text-align:center;padding:20px;}
</style>
</head>
<body>
<header>
<h2>ShopZone</h2>
<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Cart</a>
<a href="#">Contact</a>
</nav>
</header>
<section class="hero">
<h1>Welcome to ShopZone</h1>
<p>Best Deals on Trending Products</p>
<button>Shop Now</button>
</section>
<section class="products">
<div class="card">
<img src="https://via.placeholder.com/250" alt="">
<h3>Smart Watch</h3>
<p>$99</p>
<button>Add to Cart</button>
</div>
<div class="card">
<img src="https://via.placeholder.com/250" alt="">
<h3>Headphones</h3>
<p>$79</p>
<button>Add to Cart</button>
</div>
<div class="card">
<img src="https://via.placeholder.com/250" alt="">
<h3>Running Shoes</h3>
<p>$120</p>
<button>Add to Cart</button>
</div>
</section>
<footer>
<p>© 2026 ShopZone | All Rights Reserved</p>
</footer>
</body>
</html>
